<!DOCTYPE html>

<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }

            box-shadow: 0px 1px 3px rgba(0,0,0,0.1), 0px 1px 2px rgba(0,0,0,0.06);

<body class="flex min-h-screen bg-background overflow-hidden">
<!-- SideNavBar Component -->
<aside class="h-screen w-sidebar-width fixed left-0 top-0 bg-inverse-surface flex flex-col py-6 z-50">
<div class="px-6 mb-10 flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-on-primary-fixed leading-tight">Fixmate Admin</h1>
</div>
</div>
<nav class="flex-1 space-y-1 overflow-y-auto scrollbar-hide px-2">
<a class="flex items-center gap-3 px-4 py-3 bg-primary-container text-on-primary-container border-l-4 border-primary transition-all" href="/">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-label-md text-label-md">Public Home</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-surface-variant hover:bg-surface-variant/10 transition-all" href="#">
<span class="material-symbols-outlined">person_check</span>
<span class="font-label-md text-label-md">User Approvals</span>
<span class="ml-auto bg-error text-white text-[10px] px-1.5 py-0.5 rounded-full">12</span>
</a>
</nav>
</aside>

<main class="flex-1 ml-sidebar-width h-screen overflow-y-auto bg-surface p-margin-desktop">
<header class="flex justify-between items-center w-full max-w-container-max mx-auto h-16 mb-8">
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">Admin Dashboard</h2>

</div>
</header>
<section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-gutter mb-10 max-w-container-max mx-auto">
<div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant custom-shadow-1">
<h4 class="font-label-md text-label-md text-on-surface-variant">Total Users</h4>
<p class="font-display-lg text-display-lg text-on-surface mt-1">24,512</p>
</div>
<div class="bg-surface-container-lowest p-6 rounded-xl border border-outline-variant custom-shadow-1">
<h4 class="font-label-md text-label-md text-on-surface-variant">Total Sellers</h4>
<p class="font-display-lg text-display-lg text-on-surface mt-1">1,842</p>
</div>
</section>
