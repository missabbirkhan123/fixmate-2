<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fixmate | Advanced Service Marketplace</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                    "primary": "#ff1f71",
                    "accent": "#ff8e3c",
                    "dark-bg": "#0b0e14",
                    "glass": "rgba(255, 255, 255, 0.03)",
                    "glass-border": "rgba(255, 255, 255, 0.08)"
                }
              }
            }
          }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0e14; color: #ffffff; }
        .mesh-bg {
            background: radial-gradient(circle at 10% 20%, rgba(255, 31, 113, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 142, 60, 0.08) 0%, transparent 40%);
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .text-gradient {
            background: linear-gradient(to right, #ff1f71, #ff8e3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #ff1f71; border-radius: 10px; }

        /* Dropdown Styles */
        .custom-dropdown { position: relative; }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 110%;
            left: 0;
            width: 280px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 100;
        }
        .custom-dropdown:hover .dropdown-menu { display: block; }
        select optgroup { background: #0b0e14; color: #ff1f71; font-weight: bold; }
        select option { background: #0b0e14; color: #ffffff; font-weight: normal; }
    </style>
</head>
<body class="antialiased">
    <div class="mesh-bg"></div>

    <!-- Enhanced Navigation with Login/Signup -->
    <nav class="sticky top-0 z-50 border-b border-glass-border bg-dark-bg/60 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-12">
                    <a href="/" class="text-2xl font-extrabold tracking-tighter flex items-center gap-2">
                        <div class="w-8 h-8 bg-gradient-to-tr from-primary to-accent rounded-lg rotate-12"></div>
                        Fixmate
                    </a>
                </div>

                <div class="flex items-center gap-6">
                    <a href="signin.html" class="text-sm font-bold text-white/70 hover:text-white transition-all">Log In</a>
                    <a href="signup.html" class="px-6 py-2.5 bg-primary text-white rounded-full text-sm font-bold shadow-lg shadow-primary/25 hover:scale-105 transition-all">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative px-6">
        <!-- Hero Section -->
        <section class="max-w-5xl mx-auto pt-16 pb-12 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8 leading-tight tracking-tight">
                Verified Experts in <span class="text-gradient">Your Area.</span>
            </h1>

            <!-- Advanced Search Bar -->
            <div class="max-w-5xl mx-auto glass-card p-2 rounded-2xl flex flex-col lg:flex-row gap-2 shadow-2xl">
                <!-- 1. Search Text -->
                <div class="flex-[2] flex items-center gap-3 px-6 py-4 rounded-xl focus-within:bg-white/5 transition-all">
                    <span class="material-symbols-outlined text-white/30">search</span>
                    <input type="text" id="mainSearch" onkeyup="filterPosts()" placeholder="Search anything..." class="w-full bg-transparent border-none focus:ring-0 text-white placeholder:text-white/20 font-medium">
                </div>

                <!-- 2. Category Dropdown -->
                <div class="custom-dropdown flex-1 px-6 py-4 rounded-xl border-l border-glass-border cursor-pointer hover:bg-white/5 transition-all">
                    <div class="flex items-center justify-between text-white/60">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">category</span>
                            <span id="selectedCatLabel" class="text-sm font-bold whitespace-nowrap">All Categories</span>
                        </div>
                        <span class="material-symbols-outlined">expand_more</span>
                    </div>
                    <div id="categoryDropdown" class="dropdown-menu glass-card rounded-2xl p-2 shadow-2xl"></div>
                </div>

                <!-- 3. Advanced Location Select -->
                <div class="flex-1 flex items-center gap-3 px-6 py-4 rounded-xl border-l border-glass-border">
                    <span class="material-symbols-outlined text-white/30">location_on</span>
                    <select id="locationSelect" onchange="filterPosts()" class="w-full bg-transparent border-none focus:ring-0 text-white/60 font-bold text-sm appearance-none cursor-pointer">
                        <option value="">All BD</option>
                        <optgroup label="Divisions">
                            <option value="Dhaka">Dhaka</option>
                            <option value="Chattogram">Chattogram</option>
                            <option value="Sylhet">Sylhet</option>
                        </optgroup>
                    </select>
                </div>

                <button onclick="filterPosts()" class="px-10 py-4 bg-gradient-to-r from-primary to-accent text-white rounded-xl font-black hover:opacity-90 active:scale-95 transition-all">
                    Search
                </button>
            </div>

            <p class="mt-8 text-white/40 text-sm font-medium">
                New to Fixmate? <a href="signup.html" class="text-primary font-bold hover:underline">Create a free account</a> to start posting jobs.
            </p>
        </section>

        <!-- Marketplace Feed -->
        <section class="max-w-7xl mx-auto py-10">
            <div class="flex justify-center gap-4 mb-12">
                <button onclick="switchTab('seller')" id="tabSeller" class="px-8 py-3 rounded-full font-bold transition-all bg-primary text-white border border-primary">
                    Services Available
                </button>
                <button onclick="switchTab('buyer')" id="tabBuyer" class="px-8 py-3 rounded-full font-bold transition-all bg-white/5 text-white/60 border border-glass-border">
                    Jobs Posted
                </button>
            </div>
            <div id="postGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <footer class="mt-20 py-10 border-t border-glass-border text-center">
        <p class="text-white/20 text-sm">© 2024 Fixmate. Secure Login & Signup Systems Integrated.</p>
    </footer>

    <script>
        // JS data remains same for demo
        const categories = {
            "Mobile Phone": ["Screen", "Battery"],
            "Laptop": ["Keyboard", "RAM"],
            "Electrical": ["Switch", "Wiring"]
        };
        const allDistricts = ["Dhaka", "Chattogram", "Sylhet"];

        let currentTab = 'seller';
        let selectedCategory = null;
        const sellerPosts = [];
        const buyerPosts = [];

        for (let i = 1; i <= 200; i++) {
            const mainCat = Object.keys(categories)[Math.floor(Math.random() * 3)];
            const subCat = categories[mainCat][0];
            const loc = allDistricts[Math.floor(Math.random() * 3)];
            if (i <= 100) {
                sellerPosts.push({ id: i, type: 'seller', title: `Expert ${subCat}`, mainCat: mainCat, category: subCat, location: loc, price: "1500 BDT", rating: "4.8" });
            } else {
                buyerPosts.push({ id: i, type: 'buyer', title: `Need ${subCat}`, mainCat: mainCat, category: subCat, location: loc, budget: "1000 BDT" });
            }
        }

        function initDropdown() {
            const container = document.getElementById('categoryDropdown');
            let html = `<div onclick="selectCategory('All Categories', null)" class="px-4 py-2 hover:bg-white/10 rounded-lg text-sm font-bold text-primary">Clear Filter</div>`;
            Object.keys(categories).forEach(cat => {
                html += `<div onclick="selectCategory('${cat}', '${cat}')" class="px-4 py-3 hover:bg-white/10 rounded-lg text-sm font-bold">${cat}</div>`;
            });
            container.innerHTML = html;
        }

        function selectCategory(label, mainCat) {
            selectedCategory = mainCat;
            document.getElementById('selectedCatLabel').innerText = label;
            filterPosts();
        }

        function renderPosts(posts) {
            const grid = document.getElementById('postGrid');
            grid.innerHTML = '';
            posts.forEach(post => {
                grid.innerHTML += `
                    <div class="glass-card p-6 rounded-3xl border border-glass-border">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] px-2 py-1 rounded-md bg-white/10 font-bold uppercase text-white/50">${post.category}</span>
                        </div>
                        <h3 class="font-bold text-lg mb-2">${post.title}</h3>
                        <div class="flex items-center gap-2 text-white/40 text-xs mb-4">
                            <span class="material-symbols-outlined text-sm">location_on</span> ${post.location}
                        </div>
                        <p class="font-black text-white">${post.type === 'seller' ? post.price : post.budget}</p>
                    </div>`;
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabSeller').className = tab === 'seller' ? "px-8 py-3 rounded-full font-bold bg-primary" : "px-8 py-3 rounded-full font-bold bg-white/5";
            document.getElementById('tabBuyer').className = tab === 'buyer' ? "px-8 py-3 rounded-full font-bold bg-primary" : "px-8 py-3 rounded-full font-bold bg-white/5";
            filterPosts();
        }

        function filterPosts() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const filtered = (currentTab === 'seller' ? sellerPosts : buyerPosts).filter(p => p.title.toLowerCase().includes(query));
            renderPosts(filtered);
        }

        initDropdown();
        renderPosts(sellerPosts);
    </script>
</body>
</html>
