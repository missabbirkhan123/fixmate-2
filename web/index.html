<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fixmate | Premium Multi-Vendor Marketplace</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                    "primary": "#ff1f71",
                    "accent": "#ff8e3c",
                    "dark-bg": "#0b0e14",
                    "glass": "rgba(255, 255, 255, 0.03)",
                    "glass-border": "rgba(255, 255, 255, 0.08)"
                }
              }
            }
          }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0e14; color: #ffffff; }
        .mesh-bg {
            background: radial-gradient(circle at 10% 20%, rgba(255, 31, 113, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 142, 60, 0.08) 0%, transparent 40%);
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .text-gradient {
            background: linear-gradient(to right, #ff1f71, #ff8e3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link { color: rgba(255, 255, 255, 0.6); transition: all 0.3s; }
        .nav-link:hover { color: #ffffff; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #ff1f71; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">
    <div class="mesh-bg"></div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 border-b border-glass-border bg-dark-bg/60 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-12">
                    <a href="/" class="text-2xl font-extrabold tracking-tighter flex items-center gap-2">
                        <div class="w-8 h-8 bg-gradient-to-tr from-primary to-accent rounded-lg rotate-12"></div>
                        Fixmate
                    </a>
                </div>

                <div class="flex items-center gap-4">
                    <a href="signin.html" class="hidden sm:block text-sm font-bold nav-link">Log In</a>
                    <a href="signup.html" class="px-6 py-2.5 bg-white text-dark-bg rounded-full text-sm font-bold hover:scale-105 transition-all">Join Free</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative px-6">
        <!-- Hero Section -->
        <section class="max-w-5xl mx-auto pt-16 pb-20 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8 leading-tight tracking-tight">
                Marketplace for <span class="text-gradient">Everything.</span>
            </h1>

            <!-- Search Bar -->
            <div class="max-w-3xl mx-auto glass-card p-2 rounded-2xl flex flex-col md:flex-row gap-2 shadow-2xl">
                <div class="flex-1 flex items-center gap-3 px-6 py-4 rounded-xl focus-within:bg-white/5 transition-all">
                    <span class="material-symbols-outlined text-white/30">search</span>
                    <input type="text" id="mainSearch" onkeyup="filterPosts()" placeholder="Search from 200+ demo posts..." class="w-full bg-transparent border-none focus:ring-0 text-white placeholder:text-white/20 font-medium">
                </div>
                <button class="px-10 py-4 bg-gradient-to-r from-primary to-accent text-white rounded-xl font-black hover:opacity-90 active:scale-95 transition-all">
                    Search
                </button>
            </div>
        </section>

        <!-- Marketplace Feed -->
        <section class="max-w-7xl mx-auto py-10">
            <!-- Feed Tabs -->
            <div class="flex justify-center gap-4 mb-12">
                <button onclick="switchTab('seller')" id="tabSeller" class="px-8 py-3 rounded-full font-bold transition-all bg-primary text-white border border-primary">
                    Services Available (100)
                </button>
                <button onclick="switchTab('buyer')" id="tabBuyer" class="px-8 py-3 rounded-full font-bold transition-all bg-white/5 text-white/60 border border-glass-border">
                    Jobs Posted (100)
                </button>
            </div>

            <!-- Grid -->
            <div id="postGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Posts will be injected here by JS -->
            </div>
        </section>
    </main>

    <footer class="mt-20 py-10 border-t border-glass-border text-center">
        <p class="text-white/20 text-sm">© 2024 Fixmate Demo Marketplace. 200 Mock Posts Generated.</p>
    </footer>

    <script>
        let currentTab = 'seller';
        const sellerPosts = [];
        const buyerPosts = [];

        // Generate 100 Seller Posts
        const categories = ["Electrician", "Plumber", "AC Tech", "Cleaner", "Painter", "Gardener", "Carpenter", "Web Dev"];
        const locations = ["Dhaka", "Chittagong", "Sylhet", "Rajshahi", "Khulna"];

        for (let i = 1; i <= 100; i++) {
            const cat = categories[Math.floor(Math.random() * categories.length)];
            const loc = locations[Math.floor(Math.random() * locations.length)];
            sellerPosts.push({
                id: i,
                type: 'seller',
                title: `Expert ${cat} - Service #${i}`,
                category: cat,
                location: loc,
                price: `${(Math.random() * 5000 + 500).toFixed(0)} BDT`,
                rating: (Math.random() * 1.5 + 3.5).toFixed(1)
            });
        }

        // Generate 100 Buyer Posts
        for (let i = 1; i <= 100; i++) {
            const cat = categories[Math.floor(Math.random() * categories.length)];
            const loc = locations[Math.floor(Math.random() * locations.length)];
            buyerPosts.push({
                id: i,
                type: 'buyer',
                title: `Need Urgent ${cat} at ${loc}`,
                category: cat,
                location: loc,
                budget: `${(Math.random() * 3000 + 200).toFixed(0)} BDT`,
                posted: `${i}h ago`
            });
        }

        function renderPosts(posts) {
            const grid = document.getElementById('postGrid');
            grid.innerHTML = '';
            posts.forEach(post => {
                const isSeller = post.type === 'seller';
                const card = `
                    <div class="glass-card p-6 rounded-3xl hover:bg-white/5 transition-all cursor-pointer group border border-glass-border">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] px-2 py-1 rounded-md bg-white/10 font-bold uppercase tracking-widest text-white/50">${post.category}</span>
                            ${isSeller ? `<span class="flex items-center gap-1 text-accent font-bold text-xs"><span class="material-symbols-outlined text-xs fill-1">star</span>${post.rating}</span>` : `<span class="text-primary font-bold text-[10px] uppercase">Job Post</span>`}
                        </div>
                        <h3 class="font-bold text-lg mb-2 line-clamp-2 group-hover:text-primary transition-colors">${post.title}</h3>
                        <div class="flex items-center gap-2 text-white/40 text-xs mb-4">
                            <span class="material-symbols-outlined text-sm">location_on</span>
                            ${post.location}
                        </div>
                        <div class="pt-4 border-t border-glass-border flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-white/30 uppercase font-bold">${isSeller ? 'Starts at' : 'Budget'}</p>
                                <p class="font-black text-white">${isSeller ? post.price : post.budget}</p>
                            </div>
                            <button class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center group-hover:bg-primary transition-all">
                                <span class="material-symbols-outlined text-white">chevron_right</span>
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const btnSeller = document.getElementById('tabSeller');
            const btnBuyer = document.getElementById('tabBuyer');

            if (tab === 'seller') {
                btnSeller.className = "px-8 py-3 rounded-full font-bold transition-all bg-primary text-white border border-primary";
                btnBuyer.className = "px-8 py-3 rounded-full font-bold transition-all bg-white/5 text-white/60 border border-glass-border";
                renderPosts(sellerPosts);
            } else {
                btnBuyer.className = "px-8 py-3 rounded-full font-bold transition-all bg-primary text-white border border-primary";
                btnSeller.className = "px-8 py-3 rounded-full font-bold transition-all bg-white/5 text-white/60 border border-glass-border";
                renderPosts(buyerPosts);
            }
        }

        function filterPosts() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const data = currentTab === 'seller' ? sellerPosts : buyerPosts;
            const filtered = data.filter(p =>
                p.title.toLowerCase().includes(query) ||
                p.category.toLowerCase().includes(query) ||
                p.location.toLowerCase().includes(query)
            );
            renderPosts(filtered);
        }

        // Initial Load
        renderPosts(sellerPosts);
    </script>
</body>
</html>
