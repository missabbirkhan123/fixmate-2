<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Login | Fixmate Control Center</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                    "primary": "#ff1f71",
                    "accent": "#ff8e3c",
                    "dark-bg": "#0b0e14",
                    "glass": "rgba(255, 255, 255, 0.03)",
                    "glass-border": "rgba(255, 255, 255, 0.08)"
                }
              }
            }
          }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0e14; color: #ffffff; }
        .mesh-bg {
            background: radial-gradient(circle at 10% 20%, rgba(255, 31, 113, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 142, 60, 0.08) 0%, transparent 40%);
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="antialiased">
    <div class="mesh-bg"></div>

    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <!-- Admin Badge -->
            <div class="absolute top-0 right-0 p-8">
                <span class="px-3 py-1 bg-primary/20 text-primary text-[10px] font-black rounded-full uppercase tracking-[0.2em]">Restricted</span>
            </div>

            <div class="text-center mb-10">
                <a href="index.html" class="text-3xl font-black tracking-tighter flex items-center justify-center gap-2 mb-6">
                    <div class="w-8 h-8 bg-gradient-to-tr from-primary to-accent rounded-lg"></div>
                    Fixmate
                </a>
                <h2 class="text-2xl font-black">Admin Access</h2>
                <p class="text-white/40 text-sm mt-2 font-medium">Enter secure credentials to manage Fixmate</p>
            </div>

            <form id="admin-login-form" class="space-y-6">
                <div class="space-y-4">
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-4 text-white/20 group-focus-within:text-primary transition-colors">admin_panel_settings</span>
                        <input id="admin-email" type="email" required class="w-full pl-12 pr-4 py-4 bg-white/5 border border-glass-border rounded-2xl focus:outline-none focus:border-primary/50 text-sm font-bold transition-all" placeholder="Admin Email">
                    </div>
                    <div class="relative group">
                        <span class="material-symbols-outlined absolute left-4 top-4 text-white/20 group-focus-within:text-primary transition-colors">lock</span>
                        <input id="admin-password" type="password" required class="w-full pl-12 pr-4 py-4 bg-white/5 border border-glass-border rounded-2xl focus:outline-none focus:border-primary/50 text-sm font-bold transition-all" placeholder="Secure Password">
                    </div>
                </div>

                <div id="error-msg" class="hidden text-center text-xs font-bold text-primary animate-pulse bg-primary/10 py-3 rounded-xl border border-primary/20">
                    Access Denied: Invalid Credentials
                </div>

                <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-black shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                    Unlock Dashboard
                </button>
            </form>

            <p class="text-center mt-10 text-xs text-white/20 font-bold uppercase tracking-widest">
                Protected by Fixmate Security
            </p>
        </div>

        <a href="index.html" class="mt-8 text-xs font-bold text-white/40 hover:text-white transition-all flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">arrow_back</span> Return to Public Site
        </a>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            const errorBox = document.getElementById('error-msg');

            // Secure Admin Credentials
            const ADMIN_USER = "sreja174@gmail.com";
            const ADMIN_PASS = "sefalY@12547";

            if (email === ADMIN_USER && password === ADMIN_PASS) {
                // Success
                errorBox.classList.add('hidden');
                alert('Access Granted! Welcome back, Admin.');
                window.location.href = 'admin.html';
            } else {
                // Failure
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
