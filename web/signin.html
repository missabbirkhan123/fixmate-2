<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign In | Fixmate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                    "primary": "#3525cd",
                    "background": "#f8f9ff",
                    "surface": "#ffffff"
                }
              }
            }
          }
    </script>
</head>
<body class="bg-background text-slate-900 antialiased">
    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8 bg-surface p-10 rounded-3xl shadow-xl border border-slate-100">
            <div class="text-center">
                <a href="index.html" class="text-3xl font-black text-primary">Fixmate</a>
                <h2 class="mt-6 text-3xl font-bold tracking-tight">Welcome back</h2>
                <p class="mt-2 text-sm text-slate-500">Please sign in to your account</p>
            </div>

            <form id="signin-form" class="mt-8 space-y-6">
                <div class="space-y-4">
                    <div>
                        <label for="email-address" class="block text-sm font-semibold text-slate-700 mb-1">Email address</label>
                        <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="john@example.com">
                    </div>
                    <div>
                        <div class="flex items-center justify-between mb-1">
                            <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                            <a href="#" class="text-xs font-bold text-primary hover:underline">Forgot password?</a>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-700">Remember me</label>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-lg shadow-primary/20">
                        Sign In
                    </button>
                </div>
            </form>

            <p class="text-center text-sm text-slate-500">
                Don't have an account?
                <a href="signup.html" class="font-bold text-primary hover:underline">Sign up for free</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('signin-form').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('email-address').value;
            alert('Sign In Successful! Redirecting to your dashboard...');

            const lowerEmail = email.toLowerCase();
            if(lowerEmail.includes('admin')) {
                location.href = 'admin.html';
            } else if(lowerEmail.includes('seller')) {
                location.href = 'seller.html';
            } else {
                location.href = 'buyer.html';
            }
        };
    </script>
</body>
</html>
