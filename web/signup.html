<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join Fixmate | Create Your Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                    "primary": "#3525cd",
                    "background": "#f8f9ff",
                    "surface": "#ffffff"
                }
              }
            }
          }
    </script>
</head>
<body class="bg-background text-slate-900 antialiased">
    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8 bg-surface p-10 rounded-3xl shadow-xl border border-slate-100">
            <div class="text-center">
                <a href="/" class="text-3xl font-black text-primary">Fixmate</a>
                <h2 class="mt-6 text-3xl font-bold tracking-tight">Create your account</h2>
                <p class="mt-2 text-sm text-slate-500">Choose how you want to join our marketplace</p>
            </div>

            <div class="grid grid-cols-1 gap-4 mt-8">
                <!-- Join as Buyer -->
                <button onclick="location.href='/'" class="group relative flex flex-col items-center p-6 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-primary hover:bg-primary/5 transition-all text-left">
                    <span class="material-symbols-outlined text-4xl text-primary mb-2">person</span>
                    <span class="font-bold text-lg">Join as a Buyer</span>
                    <span class="text-xs text-slate-500 text-center">I want to hire professionals and get services done.</span>
                </button>

                <!-- Join as Seller -->
                <button onclick="location.href='/seller'" class="group relative flex flex-col items-center p-6 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-primary hover:bg-primary/5 transition-all text-left">
                    <span class="material-symbols-outlined text-4xl text-secondary text-green-600 mb-2">storefront</span>
                    <span class="font-bold text-lg">Join as a Seller</span>
                    <span class="text-xs text-slate-500 text-center">I want to offer my services and grow my business.</span>
                </button>
            </div>

            <div class="mt-6">
                <form action="#" method="POST" class="space-y-4">
                    <input type="hidden" name="remember" value="true">
                    <div>
                        <label for="email-address" class="sr-only">Email address</label>
                        <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm" placeholder="Email address">
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm" placeholder="Password">
                    </div>

                    <div>
                        <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                            Create Account
                        </button>
                    </div>
                </form>
            </div>

            <p class="text-center text-sm text-slate-500">
                Already have an account?
                <a href="#" class="font-bold text-primary hover:underline">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
