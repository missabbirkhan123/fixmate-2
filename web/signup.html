<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join Fixmate | Create Your Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                    "primary": "#3525cd",
                    "background": "#f8f9ff",
                    "surface": "#ffffff"
                }
              }
            }
          }
    </script>
    <style>
        .option-selected {
            border-color: #3525cd !important;
            background-color: rgba(53, 37, 205, 0.05) !important;
        }
        select option { padding: 10px; }
        .loading-dots:after {
            content: '.';
            animation: dots 1s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="bg-background text-slate-900 antialiased">
    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8 bg-surface p-10 rounded-3xl shadow-xl border border-slate-100 relative overflow-hidden">

            <!-- Success Overlay (Hidden by default) -->
            <div id="success-overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-6 text-center hidden">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
                    <span class="material-symbols-outlined text-4xl">check_circle</span>
                </div>
                <h3 class="text-2xl font-black mb-2">Success!</h3>
                <p class="text-slate-500 mb-6">Account created. Redirecting<span class="loading-dots"></span></p>
            </div>

            <div class="text-center">
                <a href="index.html" class="text-3xl font-black text-primary">Fixmate</a>
                <h2 class="mt-6 text-3xl font-bold tracking-tight">Create your account</h2>
                <p class="mt-2 text-sm text-slate-500">Choose how you want to join our marketplace</p>
            </div>

            <!-- Role Selector -->
            <div class="grid grid-cols-2 gap-4 mt-8">
                <button id="btn-buyer" type="button" onclick="selectRole('buyer')" class="group relative flex flex-col items-center p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-primary/50 transition-all text-center option-selected">
                    <span class="material-symbols-outlined text-3xl text-primary mb-2">person</span>
                    <span class="font-bold text-sm">Join as Buyer</span>
                </button>
                <button id="btn-seller" type="button" onclick="selectRole('seller')" class="group relative flex flex-col items-center p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-primary/50 transition-all text-center">
                    <span class="material-symbols-outlined text-3xl text-green-600 mb-2">storefront</span>
                    <span class="font-bold text-sm">Join as Seller</span>
                </button>
            </div>

            <div class="mt-6">
                <form id="signup-form" class="space-y-4">
                    <input type="hidden" id="user-role" name="role" value="buyer">

                    <!-- Buyer Specific Fields -->
                    <div id="buyer-fields" class="space-y-4">
                        <p class="text-xs font-semibold text-primary uppercase tracking-wider">Buyer Details</p>
                        <input type="text" id="buyer-name" name="full_name" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Full Name">
                    </div>

                    <!-- Seller Specific Fields -->
                    <div id="seller-fields" class="space-y-4 hidden">
                        <p class="text-xs font-semibold text-green-600 uppercase tracking-wider">Professional Expertise</p>
                        <input type="text" id="business-name" name="business_name" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Business Name">
                        <div class="relative">
                            <select id="seller-category" name="category" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 text-slate-700 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm cursor-pointer bg-slate-50">
                                <option value="">Select Specialty</option>
                                <option>Mobile Phone Repair</option>
                                <option>Laptop & Computer Repair</option>
                                <option>Home Appliance Repair</option>
                                <option>Electrical Repair</option>
                                <option>Plumbing Repair</option>
                            </select>
                        </div>
                    </div>

                    <!-- Account Credentials -->
                    <div class="space-y-4 pt-2 border-t border-slate-100">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Credentials</p>
                        <input id="email-address" name="email" type="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Email address">
                        <input id="password" name="password" type="password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Password">
                    </div>

                    <button type="submit" id="submit-btn" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-black rounded-xl text-white bg-primary hover:bg-primary/90 focus:outline-none transition-all shadow-lg">
                        Create <span id="submit-text" class="mx-1">Buyer</span> Account
                    </button>
                </form>
            </div>

            <p class="text-center text-sm text-slate-500">
                Already have an account?
                <a href="signin.html" class="font-bold text-primary hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        function selectRole(role) {
            const btnBuyer = document.getElementById('btn-buyer');
            const btnSeller = document.getElementById('btn-seller');
            const buyerFields = document.getElementById('buyer-fields');
            const sellerFields = document.getElementById('seller-fields');
            const userRoleInput = document.getElementById('user-role');
            const submitText = document.getElementById('submit-text');
            const submitBtn = document.getElementById('submit-btn');

            const buyerName = document.getElementById('buyer-name');
            const businessName = document.getElementById('business-name');
            const sellerCategory = document.getElementById('seller-category');

            if (role === 'buyer') {
                btnBuyer.classList.add('option-selected');
                btnSeller.classList.remove('option-selected');
                buyerFields.classList.remove('hidden');
                sellerFields.classList.add('hidden');
                userRoleInput.value = 'buyer';
                submitText.innerText = 'Buyer';
                submitBtn.className = "group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-black rounded-xl text-white bg-primary hover:bg-primary/90 transition-all shadow-lg";

                // Toggle required
                buyerName.required = true;
                businessName.required = false;
                sellerCategory.required = false;
            } else {
                btnSeller.classList.add('option-selected');
                btnBuyer.classList.remove('option-selected');
                sellerFields.classList.remove('hidden');
                buyerFields.classList.add('hidden');
                userRoleInput.value = 'seller';
                submitText.innerText = 'Seller';
                submitBtn.className = "group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-black rounded-xl text-white bg-green-600 hover:bg-green-700 transition-all shadow-lg";

                // Toggle required
                buyerName.required = false;
                businessName.required = true;
                sellerCategory.required = true;
            }
        }

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const role = document.getElementById('user-role').value;
            const overlay = document.getElementById('success-overlay');

            overlay.classList.remove('hidden');

            setTimeout(() => {
                window.location.href = (role === 'seller') ? 'seller.html' : 'buyer.html';
            }, 2000);
        });
    </script>
</body>
</html>
