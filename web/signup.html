<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join Fixmate | Create Your Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: {
                    "primary": "#3525cd",
                    "background": "#f8f9ff",
                    "surface": "#ffffff"
                }
              }
            }
          }
    </script>
    <style>
        .option-selected {
            border-color: #3525cd !important;
            background-color: rgba(53, 37, 205, 0.05) !important;
        }
        select option { padding: 10px; }
    </style>
</head>
<body class="bg-background text-slate-900 antialiased">
    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8 bg-surface p-10 rounded-3xl shadow-xl border border-slate-100">
            <div class="text-center">
                <a href="index.html" class="text-3xl font-black text-primary">Fixmate</a>
                <h2 class="mt-6 text-3xl font-bold tracking-tight">Create your account</h2>
                <p class="mt-2 text-sm text-slate-500">Choose how you want to join our marketplace</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button id="btn-buyer" onclick="selectRole('buyer')" class="group relative flex flex-col items-center p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-primary/50 transition-all text-center option-selected">
                    <span class="material-symbols-outlined text-3xl text-primary mb-2">person</span>
                    <span class="font-bold text-sm">Join as Buyer</span>
                </button>
                <button id="btn-seller" onclick="selectRole('seller')" class="group relative flex flex-col items-center p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-primary/50 transition-all text-center">
                    <span class="material-symbols-outlined text-3xl text-green-600 mb-2">storefront</span>
                    <span class="font-bold text-sm">Join as Seller</span>
                </button>
            </div>

            <div class="mt-6">
                <form id="signup-form" class="space-y-4">
                    <input type="hidden" id="user-role" name="role" value="buyer">

                    <!-- Buyer Specific Fields -->
                    <div id="buyer-fields" class="space-y-4">
                        <p class="text-xs font-semibold text-primary uppercase tracking-wider">Buyer Details</p>
                        <input type="text" name="full_name" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Full Name">
                    </div>

                    <!-- Seller Specific Fields -->
                    <div id="seller-fields" class="space-y-4 hidden">
                        <p class="text-xs font-semibold text-green-600 uppercase tracking-wider">Professional Expertise</p>
                        <input type="text" name="business_name" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Business or Trade Name">

                        <div class="relative">
                            <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-1 uppercase">Select Your Primary Category</label>
                            <select name="category" class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 text-slate-700 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm cursor-pointer bg-slate-50">
                                <option value="">What is your specialty?</option>
                                <option>1. Mobile Phone Repair</option>
                                <option>2. Laptop & Computer Repair</option>
                                <option>3. Printer Repair</option>
                                <option>4. Home Appliance Repair</option>
                                <option>5. Television Repair</option>
                                <option>6. Smart Device Repair</option>
                                <option>7. Electrical Repair</option>
                                <option>8. Plumbing Repair</option>
                                <option>9. Furniture Repair</option>
                                <option>10. Bicycle Repair</option>
                                <option>11. Motorcycle Repair</option>
                                <option>12. Car Repair</option>
                                <option>13. Generator Repair</option>
                                <option>14. Solar System Repair</option>
                                <option>15. Water Pump Repair</option>
                                <option>16. CCTV Repair</option>
                                <option>17. Door & Lock Repair</option>
                                <option>18. Kitchen Equipment Repair</option>
                                <option>19. Garden Equipment Repair</option>
                                <option>20. Power Tool Repair</option>
                                <option>21. Sewing Machine Repair</option>
                                <option>22. Office Equipment Repair</option>
                                <option>23. Audio Equipment Repair</option>
                                <option>24. Wearable Accessories Repair</option>
                                <option>25. Household Hardware Repair</option>
                                <option>26. Leather Goods Repair</option>
                                <option>27. Jewelry & Accessories Repair</option>
                                <option>28. Toys Repair</option>
                                <option>29. Fitness Equipment Repair</option>
                                <option>30. Industrial Equipment Repair</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-3 top-9 text-slate-400 pointer-events-none">unfold_more</span>
                        </div>
                    </div>

                    <!-- Shared Credentials -->
                    <div class="space-y-4 pt-2 border-t border-slate-100">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Account Credentials</p>
                        <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Email address">
                        <input id="password" name="password" type="password" autocomplete="new-password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-200 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm" placeholder="Password">
                    </div>

                    <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-lg shadow-primary/20">
                        Create <span id="submit-text" class="ml-1">Buyer</span> Account
                    </button>
                </form>
            </div>

            <p class="text-center text-sm text-slate-500">
                Already have an account?
                <a href="signin.html" class="font-bold text-primary hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        function selectRole(role) {
            const btnBuyer = document.getElementById('btn-buyer');
            const btnSeller = document.getElementById('btn-seller');
            const buyerFields = document.getElementById('buyer-fields');
            const sellerFields = document.getElementById('seller-fields');
            const userRoleInput = document.getElementById('user-role');
            const submitText = document.getElementById('submit-text');

            if (role === 'buyer') {
                btnBuyer.classList.add('option-selected');
                btnSeller.classList.remove('option-selected');
                buyerFields.classList.remove('hidden');
                sellerFields.classList.add('hidden');
                userRoleInput.value = 'buyer';
                submitText.innerText = 'Buyer';
            } else {
                btnSeller.classList.add('option-selected');
                btnBuyer.classList.remove('option-selected');
                sellerFields.classList.remove('hidden');
                buyerFields.classList.add('hidden');
                userRoleInput.value = 'seller';
                submitText.innerText = 'Seller';
            }
        }

        document.getElementById('signup-form').onsubmit = function(e) {
            e.preventDefault();
            const role = document.getElementById('user-role').value;
            alert('Signup Successful as ' + role + '! Redirecting...');
            if(role === 'seller') {
                location.href = 'seller.html';
            } else {
                location.href = 'buyer.html';
            }
        };
    </script>
</body>
</html>
